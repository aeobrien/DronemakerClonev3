  <!-- Order: Headphone, L Out, R Out, XLR, TRS, USB-A, USB-C -->
  <!-- D-size connectors shown as simple circles (actual cutout is D-shaped per Neutrik template) -->
  <!-- Screw holes shown at ~11° diagonal from vertical (Neutrik standard) -->
  <!-- At 15mm from centre, 11° gives: dx=±2.86, dy=±14.73 -->
  <!-- 1. Headphone Out — D-size (NJ3FP6C-BAG) -->
  <g
     transform="translate(-85,54.1)"
     id="g6">
