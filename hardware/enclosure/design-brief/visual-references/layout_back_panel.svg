    <circle cx="-8.8" cy="-12.1" r="1.6" class="screw-hole" id="circle3" />
    <circle cx="8.8" cy="12.1" r="1.6" class="screw-hole" id="circle4" />
    <text
       x="0"
       y="-18"
       class="component-label"
       id="text4">Headphone Out</text>
    <text
       x="0"
       y="25"
       class="dim"
       id="text5">NJ3FP6C-BAG</text>
    <text
       x="0"
       y="28"
       class="dim"
       id="text6">D-size</text>
  </g>
  <!-- 2. Left Out — D-size (NJ3FP6C-BAG) -->
