     class="title"
     id="text1">Back Panel — Layout Guide</text>
  <text
     x="0"
     y="-5.5"
     class="subtitle"
     id="text2">View from rear. Panel: 233.4 × 72.2 mm. Layout is approximate — see dimensions table for measurements.</text>
